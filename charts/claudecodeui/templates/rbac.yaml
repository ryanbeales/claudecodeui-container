{{- if and .Values.serviceAccount.create .Values.serviceAccount.rbac.enabled -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "claudecodeui.fullname" . }}-readonly
  labels:
    {{- include "claudecodeui.labels" . | nindent 4 }}
rules:
- apiGroups: ["", "apps", "batch", "extensions", "networking.k8s.io"]
  resources: ["*"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "claudecodeui.fullname" . }}-readonly-binding
  labels:
    {{- include "claudecodeui.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "claudecodeui.fullname" . }}-readonly
subjects:
- kind: ServiceAccount
  name: {{ include "claudecodeui.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
{{- end -}}
