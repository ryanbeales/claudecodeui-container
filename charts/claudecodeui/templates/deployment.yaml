apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "claudecodeui.fullname" . }}
  labels:
    {{- include "claudecodeui.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "claudecodeui.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "claudecodeui.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "claudecodeui.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: init-plugins
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["sh", "-c"]
          args:
            - |
              if [ ! -d "/home/node/.claude-code-ui/plugins/project-stats" ]; then
                mkdir -p /home/node/.claude-code-ui/plugins
                git clone https://github.com/cloudcli-ai/cloudcli-plugin-starter.git /home/node/.claude-code-ui/plugins/project-stats
                cd /home/node/.claude-code-ui/plugins/project-stats && npm install && npm run build
              fi
              if [ ! -d "/home/node/.claude-code-ui/plugins/web-terminal" ]; then
                git clone --depth 1 https://github.com/cloudcli-ai/cloudcli-plugin-terminal.git /home/node/.claude-code-ui/plugins/web-terminal
                cd /home/node/.claude-code-ui/plugins/web-terminal && npm install && npm run build
              fi
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            {{- if .Values.persistence.enabled }}
            - name: workspace
              mountPath: /home/node
            {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if .Values.ccr.enabled }}
          env:
            - name: CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC
              value: "1"
            - name: ANTHROPIC_BASE_URL
              value: "http://127.0.0.1:3456"
            - name: CLAUDE_CODE_API_BASE_URL
              value: "http://127.0.0.1:3456"
            - name: ANTHROPIC_API_KEY
              value: "sk-ant-ccr-dummy"
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort | default 3001 }}
              protocol: TCP
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            {{- if .Values.persistence.enabled }}
            - name: workspace
              mountPath: /home/node
            {{- end }}
            {{- if .Values.ccr.enabled }}
            - name: ccr-config
              mountPath: /home/node/.claude-code-router/config.json
              subPath: config.json
            - name: ccr-config
              mountPath: /home/node/.claude-code-router/custom-router.js
              subPath: custom-router.js
            {{- end }}
            {{- with .Values.volumeMounts }}
              {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        {{- if .Values.persistence.enabled }}
        - name: workspace
          persistentVolumeClaim:
            claimName: {{ include "claudecodeui.fullname" . }}-workspace
        {{- end }}
        {{- if .Values.ccr.enabled }}
        - name: ccr-config
          configMap:
            name: {{ include "claudecodeui.fullname" . }}-ccr
        {{- end }}
        {{- with .Values.volumes }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
