# Default values for claudecodeui.

replicaCount: 1
image:
  repository: ghcr.io/ryanbeales/claudecodeui-container
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "1.5.5"
imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""
  rbac:
    enabled: true
podAnnotations: {}
podLabels: {}
podSecurityContext:
  fsGroup: 1000
securityContext:
  runAsUser: 1000
  runAsGroup: 1000
  runAsNonRoot: true
service:
  type: ClusterIP
  port: 80
  targetPort: 3001
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: claudecodeui.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
persistence:
  enabled: true
  size: 10Gi
  accessMode: ReadWriteOnce
  # storageClass: "-"
resources: {}
# limits:
#   cpu: 100m
#   memory: 128Mi
# requests:
#   cpu: 100m
#   memory: 128Mi

livenessProbe:
  httpGet:
    path: /
    port: http
readinessProbe:
  httpGet:
    path: /
    port: http
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
volumes: []
volumeMounts: []
nodeSelector: {}
tolerations: []
affinity: {}
ccr:
  enabled: false
  providers:
    - name: "ollama-1"
      url: "http://ollama.ai-services.svc.cluster.local:11434/v1/chat/completions"
      apiKey: "ollama"
      models: ["qwen2.5-coder:7b"]
  routing:
    - uiModel: "opus"
      targetProvider: "ollama-1"
      targetModel: "qwen2.5-coder:7b"
    - uiModel: "sonnet"
      targetProvider: "ollama-1"
      targetModel: "qwen2.5-coder:7b"
    - uiModel: "haiku"
      targetProvider: "ollama-1"
      targetModel: "qwen2.5-coder:7b"
